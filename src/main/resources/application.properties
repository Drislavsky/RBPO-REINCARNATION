# =========================================================
# PostgreSQL Database Configuration
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/auto_service_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# =========================================================
# JPA / Hibernate Settings
# =========================================================
# ??????? ?? update, ????? ?????? ?? ????????? ??? ?????? ???????????.
# ???? ????? ?????? ??? ?????? ???? ? ????? create-drop.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# JWT & Signature Settings
# =========================================================
jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.refresh.secret=${JWT_REFRESH_SECRET}
jwt.access.expiration=900000
jwt.refresh.expiration=604800000

# ?????? ??? ???????????? ??? ? ?????? (Ticket)
license.signature.secret=MyCustomSecretKeyForLicenseVerification1234567890

# =========================================================
# Server & SSL Configuration (HTTPS)
# =========================================================
server.port=8443
server.ssl.enabled=true

# ???? ? ?????? ????? ??????????? (?????? ?????? ? src/main/resources)
server.ssl.key-store=classpath:server-keystore.p12
server.ssl.key-store-type=PKCS12

# ?????? ?? keystore (??????? ?? ?????? ??? ?????????)
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}

# ????? ????? (?? ????????? ????? '1' ??? 'autoservice')
server.ssl.key-alias=autoserviceserver

# =========================================================
# Logging Settings
# =========================================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.autoservice=DEBUG